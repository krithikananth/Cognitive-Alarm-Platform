version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: icap-postgres
    environment:
      POSTGRES_DB: icap_db
      POSTGRES_USER: icap_user
      POSTGRES_PASSWORD: icap_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U icap_user -d icap_db']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: icap-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: icap-backend
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=postgresql://icap_user:icap_password@db:5432/icap_db
      - SECRET_KEY=your-production-secret-key
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - RECOMMENDATION_CACHE_TTL_SECONDS=300
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  postgres_data:
